version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qahal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qahal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: qahal-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
